<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Control Bs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ══════════════════════════════════════════════
VARIABLES & RESET
══════════════════════════════════════════════ */
:root {
--bg: #060d18;
--bg2: #0a1628;
--bg3: #0f2040;
--border: #1a3a5c;
--text: #e0f4ff;
--dim: #5a8aaa;
--gold: #00e5ff;
--gold-bg: #002a35;
--blue: #0077cc;
--blue-bg: #001f3f;
--green: #00c9a7;
--green-bg: #002a22;
--red: #ff4d6d;
--red-bg: #2d0a14;
--radius: 8px;
--font: 'Sora', sans-serif;
--mono: 'JetBrains Mono', monospace;
--cyan: #00e5ff;
--cyan-dim: #007a99;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
background-image:radial-gradient(ellipse at top,#0a1f3a 0%,#060d18 60%)}
input,button,select{font-family:var(--font)}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ══════════════════════════════════════════════
TOPBAR
══════════════════════════════════════════════ */
#topbar{
background:var(–bg2);
border-bottom:2px solid var(–cyan-dim);
padding:8px 14px;display:flex;align-items:flex-start;gap:8px;
flex-wrap:wrap;position:fixed;top:0;left:0;right:0;z-index:1000;
box-shadow:0 2px 20px rgba(0,229,255,0.15);
}
#topbar-spacer{height:160px}
@media(min-width:700px){#topbar-spacer{height:90px}}
.logo{font-size:16px;font-weight:700;color:var(–cyan);letter-spacing:-0.5px;white-space:nowrap;
padding-top:3px;text-shadow:0 0 12px rgba(0,229,255,0.6)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(–dim);display:inline-block;margin-right:4px;transition:background .3s}
.sync-dot.ok{background:var(–green)}
.sync-dot.loading{background:var(–gold);animation:pulse 1s infinite}
.sync-dot.error{background:var(–red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.view-toggle{display:flex;gap:2px;background:var(–bg3);border-radius:8px;padding:2px}
.vtab{padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-family:var(–font);
font-size:11px;font-weight:600;background:transparent;color:var(–dim);transition:all .15s}
.vtab:hover{color:var(–text)}
.vtab.active{background:var(–cyan);color:#000;box-shadow:0 0 8px rgba(0,229,255,0.4)}

#day-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.day-tab-wrap{display:flex;flex-direction:column;gap:2px}
.day-tab{padding:4px 10px;border-radius:6px;border:1px solid var(–border);
background:transparent;color:var(–dim);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s}
.day-tab:hover{border-color:var(–gold);color:var(–gold)}
.day-tab.active{background:var(–cyan);border-color:var(–cyan);color:#000;font-weight:700;box-shadow:0 0 10px rgba(0,229,255,0.4)}
.day-label-input{width:100%;background:var(–bg3);border:1px solid var(–cyan-dim);
border-radius:4px;color:var(–cyan);padding:2px 6px;font-family:var(–mono);
font-size:10px;text-align:center;outline:none}
.day-label-input::placeholder{color:var(–dim)}

.topbar-btns{display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:5px 11px;border-radius:6px;border:none;cursor:pointer;
font-family:var(–font);font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-gold{background:var(–cyan);color:#000;font-weight:700;box-shadow:0 0 10px rgba(0,229,255,0.3)}
.btn-gold:hover{filter:brightness(1.2);box-shadow:0 0 18px rgba(0,229,255,0.5)}
.btn-blue{background:#0077cc;color:#fff;box-shadow:0 0 8px rgba(0,119,204,0.3)}
.btn-blue:hover{filter:brightness(1.2)}
.btn-green{background:#00c9a7;color:#000;font-weight:700}
.btn-green:hover{filter:brightness(1.2)}
.btn-ghost{background:rgba(0,229,255,0.05);color:var(–cyan);border:1px solid var(–cyan-dim)}
.btn-ghost:hover{background:rgba(0,229,255,0.1);border-color:var(–cyan)}
.btn-danger{background:var(–red-bg);color:var(–red);border:1px solid var(–red)}

/* ══════════════════════════════════════════════
MAIN LAYOUT
══════════════════════════════════════════════ */
#main{padding:12px 14px;display:flex;flex-direction:column;gap:12px}

/* ══════════════════════════════════════════════
CARDS
══════════════════════════════════════════════ */
.card{background:var(–bg2);border:1px solid var(–border);border-radius:var(–radius);
overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.card-header{padding:8px 14px;font-size:12px;font-weight:700;letter-spacing:.5px;
display:flex;align-items:center;justify-content:space-between}
.hdr-saldos {background:linear-gradient(90deg,#002a35,#003d52);color:var(–cyan);
border-bottom:2px solid var(–cyan-dim);text-shadow:0 0 8px rgba(0,229,255,0.4)}
.hdr-ventas {background:linear-gradient(90deg,#001f3f,#002d5c);color:#7dd3fc;border-bottom:2px solid #0077cc}
.hdr-compras{background:linear-gradient(90deg,#002a22,#003d33);color:#5eead4;border-bottom:2px solid #00c9a7}
.hdr-resumen{background:linear-gradient(90deg,#0a0a2e,#0f1a4a);color:var(–cyan);border-bottom:2px solid var(–cyan-dim)}
.hdr-mes {background:linear-gradient(90deg,#0a0a2e,#0f1a4a);color:var(–cyan);border-bottom:2px solid var(–cyan-dim)}

.prom-wrap{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:400}
.prom-inp{width:90px;background:var(–bg3);border:1px solid var(–cyan-dim);border-radius:4px;
color:var(–cyan);padding:2px 6px;font-family:var(–mono);font-size:11px;text-align:center;outline:none}
.prom-inp:focus{border-color:var(–cyan);box-shadow:0 0 6px rgba(0,229,255,0.3)}

/* ══════════════════════════════════════════════
TABLES
══════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(–bg3);color:var(–dim);font-weight:600;padding:6px 7px;
text-align:center;border-bottom:1px solid var(–border);font-size:10px;letter-spacing:.4px;white-space:nowrap}
tbody td{padding:4px 5px;text-align:center;border-bottom:1px solid #1c2128}
tbody tr.alt td{background:rgba(255,255,255,.018)}
tfoot td{background:var(–bg3);font-weight:700;padding:6px 7px;font-family:var(–mono);
font-size:11px;border-top:2px solid var(–border);text-align:center}
.td-l{text-align:left!important}
.td-mono{font-family:var(–mono);font-size:11px}
.td-gold{color:var(–cyan);font-family:var(–mono);font-size:11px;font-weight:600;text-shadow:0 0 6px rgba(0,229,255,0.3)}
.td-green{color:#7ee787;font-family:var(–mono);font-size:11px}
.td-blue{color:#79b8ff;font-family:var(–mono);font-size:11px}
.td-red{color:var(–red)}
.td-dim{color:var(–dim);font-family:var(–mono);font-size:11px}
.neg{color:var(–red)!important}

.cod-badge{display:inline-block;padding:1px 6px;border-radius:4px;
background:var(–gold-bg);color:var(–cyan);font-weight:700;font-size:10px;font-family:var(–mono);
border:1px solid var(–cyan-dim);text-shadow:0 0 6px rgba(0,229,255,0.4)}
.day-chip{display:inline-block;padding:2px 8px;border-radius:4px;
background:var(–bg3);color:var(–cyan);font-family:var(–mono);font-size:10px;font-weight:600;
border:1px solid var(–cyan-dim)}

/* ══════════════════════════════════════════════
INPUTS IN TABLES
══════════════════════════════════════════════ */
.ni,.ti{width:100%;background:var(–bg3);border:1px solid var(–border);border-radius:4px;
color:var(–text);padding:3px 5px;font-family:var(–mono);font-size:11px;outline:none}
.ni{text-align:center}.ti{text-align:left}
.ni:focus,.ti:focus{border-color:var(–cyan);box-shadow:0 0 4px rgba(0,229,255,0.2)}
.ni-fmt{width:100%;background:var(–bg3);border:1px solid var(–border);border-radius:4px;
color:var(–cyan);padding:3px 5px;font-family:var(–mono);font-size:11px;outline:none;
text-align:center;}
.ni-fmt:focus{border-color:var(–cyan);box-shadow:0 0 4px rgba(0,229,255,0.2);color:var(–text)}
.ni-cod{width:50px;text-align:center}
.del-btn{background:transparent;border:none;color:var(–red);cursor:pointer;font-size:15px;padding:0 3px;line-height:1}
.del-btn:hover{color:#ff6b6b}
.add-row-btn{display:block;width:100%;padding:10px;background:var(–bg3);
border:none;border-top:2px solid var(–border);color:var(–text);cursor:pointer;
font-size:13px;font-weight:700;transition:all .15s;letter-spacing:.3px;
position:relative;z-index:1;-webkit-tap-highlight-color:rgba(0,229,255,.2)}
.add-row-btn:hover,.add-row-btn:active{color:var(–cyan);background:rgba(0,229,255,.08)}

/* ══════════════════════════════════════════════
MOV GRID (ventas + compras side by side on desktop)
══════════════════════════════════════════════ */
.mov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:860px){.mov-grid{grid-template-columns:1fr}}

/* ══════════════════════════════════════════════
RESUMEN DÍA
══════════════════════════════════════════════ */
.res-grid{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
@media(max-width:580px){.res-grid{grid-template-columns:1fr}}
.res-row{display:flex;justify-content:space-between;align-items:center;
padding:6px 10px;border-radius:6px;font-size:11px}
.res-neutral{background:var(–bg3)}
.res-compra {background:var(–green-bg)}
.res-venta {background:var(–blue-bg)}
.res-win {background:#0d2818;border:1px solid var(–green)}
.res-loss {background:var(–red-bg);border:1px solid var(–red)}
.res-label {color:var(–dim);font-size:10px}
.res-val {font-weight:700;font-family:var(–mono);font-size:12px}
.res-win .res-val{color:#7ee787;font-size:14px}
.res-loss .res-val{color:var(–red);font-size:14px}

/* ══════════════════════════════════════════════
RESUMEN MES
══════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.kpi-card{padding:14px 16px;border-radius:10px;border:1px solid var(–border)}
.kpi-green {background:linear-gradient(135deg,#002a22,#003d33);border-color:var(–green);box-shadow:0 0 12px rgba(0,201,167,0.15)}
.kpi-blue {background:linear-gradient(135deg,#001f3f,#002d5c);border-color:var(–blue);box-shadow:0 0 12px rgba(0,119,204,0.15)}
.kpi-gold {background:linear-gradient(135deg,#002a35,#003d52);border-color:var(–cyan);box-shadow:0 0 12px rgba(0,229,255,0.15)}
.kpi-neut {background:var(–bg2)}
.kpi-label {font-size:9px;font-weight:700;letter-spacing:.8px;color:var(–dim);margin-bottom:4px}
.kpi-val {font-family:var(–mono);font-size:15px;font-weight:700}
.kpi-green .kpi-val{color:#7ee787}
.kpi-blue .kpi-val{color:#79b8ff}
.kpi-gold .kpi-val{color:var(–gold)}
.kpi-sub {font-family:var(–mono);font-size:11px;color:var(–dim);margin-top:2px}

/* ══════════════════════════════════════════════
MODAL
══════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
display:flex;align-items:center;justify-content:center}
.modal{background:var(–bg2);border:1px solid var(–border);border-radius:12px;
padding:20px;width:min(460px,95vw);max-height:85vh;overflow-y:auto}
.modal h3{color:var(–gold);margin-bottom:14px;font-size:14px}
.acc-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.acc-item{display:flex;align-items:center;justify-content:space-between;
padding:6px 10px;background:var(–bg3);border-radius:6px}
.acc-item span{font-family:var(–mono);font-size:11px}
.acc-add{display:flex;gap:6px;margin-bottom:10px}
.acc-add input{flex:1;background:var(–bg3);border:1px solid var(–border);border-radius:6px;
color:var(–text);padding:6px 10px;font-size:12px;outline:none}
.acc-add input:focus{border-color:var(–gold)}

/* ══════════════════════════════════════════════
CONFIG MODAL
══════════════════════════════════════════════ */
.cfg-field{margin-bottom:12px}
.cfg-label{font-size:10px;color:var(–dim);letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.cfg-input{width:100%;background:var(–bg3);border:1px solid var(–border);border-radius:6px;
color:var(–text);padding:7px 10px;font-family:var(–mono);font-size:11px;outline:none}
.cfg-input:focus{border-color:var(–gold)}
.cfg-note{font-size:10px;color:var(–dim);margin-top:4px;line-height:1.5}

.toast{position:fixed;bottom:20px;right:20px;background:var(–bg3);border:1px solid var(–border);
border-radius:8px;padding:10px 16px;font-size:12px;z-index:300;transition:opacity .3s;max-width:280px}
.toast.hide{opacity:0;pointer-events:none}
.toast.ok {border-color:var(–green);color:#7ee787}

/* ── RESUMEN CLIENTE ── */
.hdr-cliente{background:linear-gradient(90deg,#1a0a2e,#2d1a4a);color:#c084fc;border-bottom:2px solid #7c3aed}
.cliente-search{padding:10px 12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(–border)}
.cliente-search input{flex:1;background:var(–bg3);border:1px solid var(–border);border-radius:6px;
color:var(–text);padding:6px 10px;font-size:12px;outline:none}
.cliente-search input:focus{border-color:#7c3aed}
.cliente-search datalist{}
.factura{padding:12px;font-family:var(–mono);font-size:11px}
.factura-empty{padding:20px;text-align:center;color:var(–dim);font-size:11px}
.factura-header{background:linear-gradient(90deg,#1a0a2e,#2d1a4a);border-radius:6px;
padding:10px 14px;margin-bottom:10px;border:1px solid #7c3aed}
.factura-title{font-size:13px;font-weight:700;color:#c084fc;margin-bottom:2px}
.factura-sub{font-size:10px;color:var(–dim)}
.factura-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.factura-table th{background:var(–bg3);color:var(–dim);font-size:10px;padding:5px 8px;
text-align:center;border-bottom:1px solid var(–border);letter-spacing:.5px}
.factura-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #1c2128;font-size:11px}
.factura-table tr.alt td{background:rgba(124,58,237,.06)}
.factura-total{background:var(–bg3);border-radius:6px;padding:8px 12px;
display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
border:1px solid #7c3aed}
.factura-total-label{font-size:10px;color:var(–dim);font-weight:600;letter-spacing:.5px}
.factura-total-val{font-size:14px;font-weight:700;color:#c084fc}
.factura-copy-btn{display:block;width:100%;padding:8px;background:rgba(124,58,237,.2);
border:1px solid #7c3aed;border-radius:6px;color:#c084fc;cursor:pointer;
font-family:var(–font);font-size:11px;font-weight:600;transition:all .15s;text-align:center}
.factura-copy-btn:hover{background:rgba(124,58,237,.35)}
.row-done td { background:rgba(46,160,67,.13)!important; opacity:.75; }
.row-done .chk-btn { color:#7ee787; }
.chk-btn {
background:transparent; border:1px solid var(–border); border-radius:4px;
color:var(–dim); cursor:pointer; font-size:13px; padding:1px 4px;
transition:all .15s; min-width:26px;
}
.chk-btn:hover { border-color:var(–green); color:#7ee787; }
.toast.err {border-color:var(–red);color:var(–red)}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:60vh;gap:12px;color:var(–dim)}
.spinner{width:32px;height:32px;border:3px solid var(–border);border-top-color:var(–gold);
border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#cfg-url-hint{font-size:10px;color:var(–dim);margin-top:6px;line-height:1.6}
</style>

</head>
<body>

<!-- TOPBAR -->

<div id="topbar">
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
<span class="logo">₿s Control</span>
<div class="view-toggle">
<button class="vtab active" onclick="setView('dia')" id="vtab-dia">📅 Día</button>
<button class="vtab" onclick="setView('mes')" id="vtab-mes">📊 Mes</button>
</div>
<span style="font-size:10px;color:var(--dim)" id="sync-status">
<span class="sync-dot" id="sync-dot"></span><span id="sync-text">Sin configurar</span>
</span>
</div>
<div id="day-tabs"></div>
<div class="topbar-btns">
<button class="btn btn-gold" onclick="addDay()">+ Día</button>
<button class="btn btn-blue" onclick="exportExcel()">⬇ Excel</button>
<button class="btn btn-green" onclick="syncNow()" id="btn-sync">☁ Sincronizar</button>
<button class="btn btn-ghost" onclick="openAccMgr()">⚙ Cuentas</button>
<button class="btn btn-ghost" onclick="openConfig()">🔗 Sheets</button>
<button class="btn btn-danger" onclick="resetMonth()">↺ Mes</button>
</div>
</div>

<!-- MAIN -->

<div id="topbar-spacer"></div>
<div id="main"></div>

<!-- TOAST -->

<div class="toast hide" id="toast"></div>

<!-- MODAL CUENTAS -->

<div class="overlay" id="modal-acc" style="display:none" onclick="closeAccMgr()">
<div class="modal" onclick="event.stopPropagation()">
<h3>⚙ Gestión de Cuentas</h3>
<div class="acc-list" id="acc-list"></div>
<div class="acc-add">
<input id="new-cod" placeholder="COD" style="max-width:65px"
oninput="this.value=this.value.toUpperCase()"/>
<input id="new-nom" placeholder="Nombre de la cuenta"
oninput="this.value=this.value.toUpperCase()"/>
<button class="btn btn-gold" onclick="addAccount()">+ Agregar</button>
</div>
<button class="btn btn-ghost" style="width:100%" onclick="closeAccMgr()">Cerrar</button>
</div>
</div>

<!-- MODAL CONFIG SHEETS -->

<div class="overlay" id="modal-cfg" style="display:none" onclick="closeCfg()">
<div class="modal" onclick="event.stopPropagation()">
<h3>🔗 Conectar con Google Sheets</h3>
<div class="cfg-field">
<div class="cfg-label">URL DEL APPS SCRIPT (Web App URL)</div>
<input class="cfg-input" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec"/>
<div id="cfg-url-hint">
Pega aquí la URL que obtienes al publicar el Apps Script como aplicación web.<br>
👉 Ver instrucciones en el archivo <strong>INSTRUCCIONES.txt</strong> que viene junto a esta app.
</div>
</div>
<div style="display:flex;gap:8px;margin-top:4px">
<button class="btn btn-green" onclick="saveCfg()">💾 Guardar y probar</button>
<button class="btn btn-ghost" onclick="closeCfg()">Cancelar</button>
</div>
</div>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const DEFAULT_ACCOUNTS = [
{cod:"VY",nombre:"VENEZUELA YHOSUE"},{cod:"BY",nombre:"BANESCO YOSMEL"},
{cod:"PH",nombre:"PROVINCIAL HUGO"}, {cod:"BD",nombre:"BANESCO DEISY"},
{cod:"VP",nombre:"VENEZUELA PAPA"}, {cod:"DN",nombre:"DANIEL"},
{cod:"DR",nombre:"DIRECTOS"}, {cod:"VM",nombre:"VNZLA MAMA"},
{cod:"PP",nombre:"PAPA PROVINCIAL"},
];

let state = {
accounts: DEFAULT_ACCOUNTS,
days: [],
currentDay: 0,
scriptUrl: "",
};
let currentView = "dia";

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const n = v => parseFloat(v)||0;
const fmt = (v,d=2) => v===undefined||v===null||v===""?"":Number(v).toLocaleString("es-CO",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtCOP = v => (v||v===0)?"$ "+Number(v).toLocaleString("es-CO",{minimumFractionDigits:0,maximumFractionDigits:0}):"";

function todayStr(){
const d=new Date();
return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
}

function emptyDay(prevDay=null){
const promPrev = prevDay ? calcPromCompraReal(prevDay) : 0;
return {
label: todayStr(),
saldos: state.accounts.map(a=>({
cod:a.cod,
inicioBs: prevDay?(prevDay.saldos.find(s=>s.cod===a.cod)?.stock??0):0,
promedio: promPrev,
})),
ventas: [{nombre:"",cod:"",tasa:"",bs:"",done:false}],
compras: [{nombre:"",cod:"",tasa:"",bs:"",done:false}],
};
}

function calcStock(s,ventas,compras){
const c=compras.filter(x=>x.cod===s.cod).reduce((a,x)=>a+n(x.bs),0);
const v=ventas.filter(x=>x.cod===s.cod).reduce((a,x)=>a+n(x.bs),0);
return n(s.inicioBs)+c-v;
}

function calcPromCompraReal(day){
const totInicio = day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
const promInicio = n(day.saldos[0]?.promedio);
const sumBsC = day.compras.reduce((a,c)=>a+n(c.bs),0);
const sumCopC = day.compras.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0);
const denom = totInicio+sumBsC;
return denom===0?promInicio:(totInicio*promInicio+sumCopC)/denom;
}

function calcResumen(day){
const inicioBs = day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
const promInicio = n(day.saldos[0]?.promedio);
const inicioPesos= inicioBs*promInicio;
const bsComp = day.compras.reduce((a,c)=>a+n(c.bs),0);
const copComp = day.compras.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0);
const bsVend = day.ventas.reduce((a,v)=>a+n(v.bs),0);
const copVend = day.ventas.reduce((a,v)=>a+n(v.bs)*n(v.tasa),0);
const promCompra = calcPromCompraReal(day);
const promVenta = bsVend>0?copVend/bsVend:0;
const utilidad = (promVenta-promCompra)*bsVend;
const quedaBs = inicioBs+bsComp-bsVend;
const valorPesos = quedaBs*promCompra;
return {inicioBs,inicioPesos,bsComp,copComp,bsVend,copVend,promCompra,promVenta,utilidad,quedaBs,valorPesos};
}

// GOOGLE SHEETS SYNC
// ══════════════════════════════════════════════
function setSyncStatus(status, text){
const dot = document.getElementById("sync-dot");
const txt = document.getElementById("sync-text");
dot.className = "sync-dot " + status;
txt.textContent = text;
}

async function syncLoad(){
if(!state.scriptUrl) return;
setSyncStatus("loading","Cargando...");
try{
const url = state.scriptUrl + "?action=load";
const res = await fetch(url);
const data = await res.json();
if(data.ok){
state.accounts = data.accounts || state.accounts;
state.days = data.days || state.days;
state.currentDay= data.currentDay|| 0;
saveLocal();
setSyncStatus("ok","Sincronizado ✓");
render();
showToast("Datos cargados desde Google Sheets","ok");
} else {
setSyncStatus("error","Error al cargar");
showToast("Error: "+data.error,"err");
}
}catch(e){
setSyncStatus("error","Sin conexión");
}
}

let syncTimer = null;
function syncSave(){
if(!state.scriptUrl) return;
// Debounce: wait 1.5s after last change before saving
clearTimeout(syncTimer);
setSyncStatus("loading","Guardando...");
syncTimer = setTimeout(async ()=>{
try{
const res = await fetch(state.scriptUrl, {
method:"POST",
body: JSON.stringify({action:"save", state:{
accounts: state.accounts,
days: state.days,
currentDay: state.currentDay,
}})
});
const data = await res.json();
if(data.ok){
setSyncStatus("ok","Guardado ✓");
} else {
setSyncStatus("error","Error al guardar");
}
}catch(e){
setSyncStatus("error","Sin conexión");
}
}, 1500);
}

async function syncNow(){
if(!state.scriptUrl){
openConfig();
return;
}
await syncLoad();
}

const stEl = row.querySelector(".td-stock");
stEl.textContent = fmt(stock,2);
stEl.className = "td-stock td-gold" + (stock<0?" neg":"");
});
// totals
const totInicio = day.saldos.reduce((a,s)=>a+n(s.inicioBs),0);
const totPesos = day.saldos.reduce((a,s)=>a+n(s.inicioBs)*n(s.promedio),0);
const totCompra = day.compras.reduce((a,c)=>a+n(c.bs),0);
const totVenta = day.ventas.reduce((a,v)=>a+n(v.bs),0);
const totStock = day.saldos.reduce((a,s)=>a+calcStock(s,day.ventas,day.compras),0);

trow.cells[2].textContent = fmt(totPesos,0);

}

function updateMov(tipo, idx, field, val){

const acc = state.accounts.find(a=>a.cod===val.toUpperCase());

copEl.textContent = n(r.bs)&&n(r.tasa)?fmt(n(r.bs)*n(r.tasa),0):"";

// ══════════════════════════════════════════════
// ACCOUNT MANAGER
// ══════════════════════════════════════════════
function openAccMgr(){
const list = document.getElementById("acc-list");
list.innerHTML = state.accounts.map(a=>`
<div class="acc-item">
<span><strong style="color:var(--gold)">${a.cod}</strong> — ${a.nombre}</span>
<button class="del-btn" onclick="removeAccount('${a.cod}')">×</button>
</div>`).join("");
document.getElementById("modal-acc").style.display="flex";
}
function closeAccMgr(){ document.getElementById("modal-acc").style.display="none"; }

function addAccount(){
const cod = document.getElementById("new-cod").value.trim().toUpperCase();
const nom = document.getElementById("new-nom").value.trim().toUpperCase();
if(!cod||!nom){ showToast("Completa COD y Nombre","err"); return; }
if(state.accounts.find(a=>a.cod===cod)){ showToast("Ese COD ya existe","err"); return; }
state.accounts.push({cod,nombre:nom});
state.days.forEach(day=>{
day.saldos.push({cod,inicioBs:0,promedio:day.saldos[0]?.promedio||0});
});
saveLocal(); syncSave();
openAccMgr(); render();
showToast(`Cuenta ${cod} agregada`,"ok");
}

function removeAccount(cod){
if(!confirm(`¿Eliminar cuenta ${cod}?`)) return;
state.accounts = state.accounts.filter(a=>a.cod!==cod);
state.days.forEach(day=>{ day.saldos=day.saldos.filter(s=>s.cod!==cod); });
saveLocal(); syncSave();
openAccMgr(); render();
}

// ══════════════════════════════════════════════
// EXCEL EXPORT
// ══════════════════════════════════════════════
function exportExcel(){
const wb = XLSX.utils.book_new();
state.days.forEach((day,di)=>{
const r = calcResumen(day);
const lbl = day.label||`Día ${String(di+1).padStart(2,"0")}`;
const rows=[[`CONTROL DIARIO Bs — ${lbl}`],[]];
rows.push(["SALDOS","","","","","",""]);
rows.push(["COD","CUENTA","INICIO Bs","PROMEDIO","PESOS","COMPRA","VENTA","STOCK"]);
day.saldos.forEach(s=>{
const acc=state.accounts.find(a=>a.cod===s.cod);
const comp=day.compras.filter(c=>c.cod===s.cod).reduce((a,c)=>a+n(c.bs),0);
const vent=day.ventas.filter(v=>v.cod===s.cod).reduce((a,v)=>a+n(v.bs),0);
rows.push([s.cod,acc?.nombre||"",n(s.inicioBs),n(s.promedio),n(s.inicioBs)*n(s.promedio),comp,vent,n(s.inicioBs)+comp-vent]);
});
rows.push([]);
rows.push(["VENTAS","","","","","","","COMPRAS","","","","",""]);
rows.push(["NOMBRE","COD","CUENTA","TASA","Bs","PESOS","","NOMBRE","COD","CUENTA","TASA","Bs","PESOS"]);
const vF=day.ventas.filter(v=>v.bs||v.nombre);
const cF=day.compras.filter(c=>c.bs||c.nombre);
const mx=Math.max(vF.length,cF.length,1);
for(let i=0;i<mx;i++){
const v=vF[i]||{},c=cF[i]||{};
const vA=state.accounts.find(a=>a.cod===v.cod);
const cA=state.accounts.find(a=>a.cod===c.cod);
rows.push([v.nombre||"",v.cod||"",vA?.nombre||"",n(v.tasa)||"",n(v.bs)||"",n(v.bs)&&n(v.tasa)?n(v.bs)*n(v.tasa):"",
"",c.nombre||"",c.cod||"",cA?.nombre||"",n(c.tasa)||"",n(c.bs)||"",n(c.bs)&&n(c.tasa)?n(c.bs)*n(c.tasa):""]);
}
rows.push(["TOTAL","","","",vF.reduce((a,v)=>a+n(v.bs),0),vF.reduce((a,v)=>a+n(v.bs)*n(v.tasa),0),
"","TOTAL","","","",cF.reduce((a,c)=>a+n(c.bs),0),cF.reduce((a,c)=>a+n(c.bs)*n(c.tasa),0)]);
rows.push([]);
rows.push(["RESUMEN DEL DÍA"]);
[["INICIO EN Bs",r.inicioBs],["INICIO EN PESOS",r.inicioPesos],
["Bs COMPRADOS",r.bsComp],["Bs COMPRADOS EN PESOS",r.copComp],
["Bs VENDIDOS",r.bsVend],["Bs VENDIDOS EN PESOS",r.copVend],
["PROMEDIO COMPRA REAL",r.promCompra],["PROMEDIO VENTA",r.promVenta],
["UTILIDAD (COP)",r.utilidad],["QUEDA EN Bs",r.quedaBs],
["VALOR EN PESOS (costo)",r.valorPesos]
].forEach(([l,v])=>rows.push([l,v]));
const ws=XLSX.utils.aoa_to_sheet(rows);
ws['!cols']=Array(14).fill({wch:16});
XLSX.utils.book_append_sheet(wb,ws,lbl.slice(0,31));
});
// Resumen General
const sRows=[["RESUMEN GENERAL DEL MES"],[]];
sRows.push(["DÍA","INICIO Bs","Bs COMP","COP COMP","Bs VEND","COP VEND","PROM COMPRA","PROM VENTA","UTILIDAD","QUEDA Bs","VALOR PESOS"]);
let tBC=0,tCC=0,tBV=0,tCV=0,tU=0;
state.days.forEach((day,di)=>{
const r=calcResumen(day);
tBC+=r.bsComp;tCC+=r.copComp;tBV+=r.bsVend;tCV+=r.copVend;tU+=r.utilidad;
sRows.push([day.label||`Día ${di+1}`,r.inicioBs,r.bsComp,r.copComp,r.bsVend,r.copVend,r.promCompra,r.promVenta,r.utilidad,r.quedaBs,r.valorPesos]);
});
sRows.push([]);
sRows.push(["TOTALES","",tBC,tCC,tBV,tCV,"","",tU,"",""]);
const wsS=XLSX.utils.aoa_to_sheet(sRows);
wsS['!cols']=Array(11).fill({wch:16});
XLSX.utils.book_append_sheet(wb,wsS,"Resumen General");
XLSX.writeFile(wb,`Control_Bs_${new Date().toISOString().slice(0,10)}.xlsx`);
showToast("Excel descargado ✓","ok");
}

// TOAST
// ══════════════════════════════════════════════
let toastTimer=null;
function showToast(msg,type="ok"){
const el=document.getElementById("toast");
el.textContent=msg;
el.className=`toast ${type}`;
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>el.classList.add("hide"),3000);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init(){
loadLocal();
if(state.days.length===0) state.days=[emptyDay()];
render();
if(state.scriptUrl){
setSyncStatus("loading","Sincronizando...");
await syncLoad();
} else {
setSyncStatus("","Sin configurar");
}
}

// ══════════════════════════════════════════════════════════════
// RESUMEN POR CLIENTE
// ══════════════════════════════════════════════════════════════
let clienteFiltro = "";

function setClienteFiltro(val) {
clienteFiltro = val;
renderClienteCard();
}

function renderClienteCard() {
const el = document.getElementById("cliente-card");
if(el) el.outerHTML = renderClienteHTML();
}

function renderClienteHTML() {
const day = state.days[state.currentDay];
// Build unique client list from ventas
const allNames = day.ventas
.filter(v=>v.nombre||v.bs)
.map(v=>v.nombre)
.filter((v,i,a)=>v&&a.indexOf(v)===i)
.sort();

const filtered = clienteFiltro
? day.ventas.filter(v=>v.nombre&&v.nombre.toLowerCase().includes(clienteFiltro.toLowerCase())&&n(v.bs)>0)
: [];

const totBs = filtered.reduce((a,v)=>a+n(v.bs),0);
const totCop = filtered.reduce((a,v)=>a+n(v.bs)*n(v.tasa),0);

let facturaHTML = "";
if(clienteFiltro && filtered.length===0) {
facturaHTML = `<div class="factura-empty">Sin transacciones para "<strong>${clienteFiltro}</strong>"</div>`;
} else if(filtered.length>0) {
let rows="";
filtered.forEach((v,i)=>{
const cop=n(v.bs)*n(v.tasa);
rows+=`<tr class="${i%2===0?"alt":""}">
<td>${i+1}</td>
<td class="td-green">${fmt(n(v.bs),2)}</td>
<td>${fmt(n(v.tasa),4)}</td>
<td class="td-blue">${fmtCOP(cop)}</td>
<td>${state.accounts.find(a=>a.cod===v.cod)?.nombre||v.cod||"—"}</td>
</tr>`;
});

// Build copy text
const copyText = buildFacturaText(clienteFiltro, filtered, totBs, totCop, day.label);

facturaHTML = `
<div class="factura">
<div class="factura-header">
<div class="factura-title">👤 ${clienteFiltro.toUpperCase()}</div>
<div class="factura-sub">${day.label} · ${filtered.length} transacción${filtered.length>1?"es":""}</div>
</div>
<table class="factura-table">
<thead><tr><th>#</th><th>Bs</th><th>TASA</th><th>TOTAL COP</th><th>CUENTA</th></tr></thead>
<tbody>${rows}</tbody>
</table>
<div class="factura-total">
<div>
<div class="factura-total-label">TOTAL Bs</div>
<div style="color:#7ee787;font-family:var(--mono);font-weight:700">${fmt(totBs,2)}</div>
</div>
<div style="text-align:right">
<div class="factura-total-label">TOTAL COP</div>
<div class="factura-total-val">${fmtCOP(totCop)}</div>
</div>
</div>
<button class="factura-copy-btn" onclick="copyFactura(\`${copyText.replace(/`/g,"'")}\`)">
📋 Copiar resumen para enviar
</button>
</div>`;
} else {
facturaHTML = `<div class="factura-empty">Escribe el nombre del cliente para ver sus transacciones</div>`;
}

return `<div class="card" id="cliente-card">
<div class="card-header hdr-cliente">👤 RESUMEN POR CLIENTE</div>
<div class="cliente-search">
<input type="text" placeholder="🔍 Buscar cliente..."
value="${clienteFiltro}"
list="clientes-list"
oninput="setClienteFiltro(this.value)"
autocomplete="off"/>
<datalist id="clientes-list">
${allNames.map(n=>`<option value="${n}">`).join("")}
</datalist>
${clienteFiltro?`<button class="btn btn-ghost" style="font-size:11px;padding:4px 8px" onclick="setClienteFiltro('');document.querySelector('.cliente-search input').value=''">✕</button>`:""}
</div>
${facturaHTML}
</div>`;
}

function buildFacturaText(nombre, ventas, totBs, totCop, fecha) {
let txt = "━━━━━━━━━━━━━━━━━━━━━━━\n";
txt += ` RESUMEN DE COMPRA\n`;
txt += ` ${nombre.toUpperCase()}\n`;
txt += ` ${fecha}\n`;
txt += "━━━━━━━━━━━━━━━━━━━━━━━\n\n";
ventas.forEach((v,i)=>{
const cop = n(v.bs)*n(v.tasa);
txt += ` ${i+1}. ${fmt(n(v.bs),2)} Bs\n`;
txt += ` Tasa: ${fmt(n(v.tasa),4)} COP/Bs\n`;
txt += ` Total: ${fmtCOP(cop)}\n\n`;
});
txt += "━━━━━━━━━━━━━━━━━━━━━━━\n";
txt += ` TOTAL Bs: ${fmt(totBs,2)}\n`;
txt += ` TOTAL COP: ${fmtCOP(totCop)}\n`;
txt += "━━━━━━━━━━━━━━━━━━━━━━━";
return txt;
}

function copyFactura(text) {
navigator.clipboard.writeText(text).then(()=>{
showToast("Resumen copiado — listo para pegar en WhatsApp ✓","ok");
}).catch(()=>{
showToast("No se pudo copiar","err");
});
}

// ── Formatted number input helpers ──
function rawNum(str) {
if(!str && str!==0) return "";
let s = String(str).trim();
// Detect format: if both . and , present, figure out which is decimal
if(s.includes('.') && s.includes(',')) {
// whichever comes last is decimal
if(s.lastIndexOf('.') > s.lastIndexOf(',')) {
s = s.replace(/,/g,''); // remove thousand sep commas
} else {
s = s.replace(/\./g,'').replace(',','.'); // remove thousand sep dots, comma->dot
}
} else if(s.includes(',')) {
// only comma: could be decimal (5,68) or thousand (1,000)
const parts = s.split(',');
if(parts.length===2 && parts[1].length<=4 && parts[1].length>=1) {
s = s.replace(',','.'); // treat as decimal
} else {
s = s.replace(/,/g,''); // treat as thousand separator
}
} else if(s.includes('.')) {
// only dot: could be decimal (5.68) or thousand (1.000)
const parts = s.split('.');
if(parts.length===2 && parts[1].length<=4 && parts[1].length>=1) {
// keep as is, it's decimal
} else {
s = s.replace(/\./g,''); // treat as thousand separator
}
}
return parseFloat(s)||0;
}

function fmtInput(val) {
if(val===undefined||val===null||val==="") return "";
const num = rawNum(val);
if(num===0) return "";
return num.toLocaleString("es-CO", {minimumFractionDigits:0, maximumFractionDigits:4});
}

function makeFmtInput(id, value, onChangeFn, placeholder="0") {
return `<input class="ni-fmt" id="${id}"
value="${fmtInput(value)}"
placeholder="${placeholder}"
inputmode="decimal"
onfocus="this.value=this.value.replace(/\\./g,'').replace(/,/g,'.')==='0'?'':this.value.replace(/[^0-9,]/g,'')"
oninput="
let raw=this.value.replace(/[^0-9,]/g,'');
this.value=raw;
let num=parseFloat(raw.replace(',','.'))||0;
${onChangeFn}(num);
"
onblur="
let num=parseFloat(this.value.replace(/\\./g,'').replace(',','.'))||0;
this.value=num?num.toLocaleString('es-CO',{minimumFractionDigits:0,maximumFractionDigits:4}):'';
"
/>`;
}

init();
</script>
